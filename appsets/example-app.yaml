---
# ApplicationSet: example-app
#
# Generates one ArgoCD Application per cluster directory containing a cluster.yaml.
#
# Chart source: external charts repo (separate git repository)
# Values source: this repo — hierarchical overlay, lowest → highest priority:
#   1. chart repo values.yaml           (chart author defaults, implicit)
#   2. config/base/values.yaml          (global platform overrides)
#   3. config/envs/<env>/values.yaml
#   4. config/envs/<env>/<region>/values.yaml
#   5. config/envs/<env>/<region>/<cluster>/values.yaml
#
# Chart version is pinned per cluster via the `chartVersion` field in cluster.yaml,
# allowing dev to run a newer chart version before promoting to staging/prod.
#
# To add a new cluster: create cluster.yaml in config/envs/<env>/<region>/<cluster>/
# To add a new app:     duplicate this file, update name + chart path
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: example-app
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions:
    - missingkey=error

  generators:
    - git:
        repoURL: https://github.com/rhysmcneill/poc-argocd-monorepo
        revision: HEAD
        files:
          - path: "config/envs/*/*/*/cluster.yaml"

  template:
    metadata:
      name: "example-app-{{ .env }}-{{ .cluster }}"
      labels:
        app: example-app
        env: "{{ .env }}"
        region: "{{ .region }}"
        cluster: "{{ .cluster }}"

    spec:
      project: "{{ .env }}"

      sources:
        # ── Source 1: Helm chart from the charts repo ──────────────────────────
        # The chart's own values.yaml is the implicit base.
        # Our valueFiles below layer on top of it.
        - repoURL: https://github.com/rhysmcneill/charts  # <-- update to your charts repo
          targetRevision: "{{ .chartVersion }}"
          path: "charts/example-app"
          helm:
            releaseName: example-app
            # valueFiles paths prefixed with $values/ resolve against Source 2 below.
            # Files are applied in order — later files override earlier ones.
            valueFiles:
              - $values/config/base/values.yaml
              - "$values/config/envs/{{ .env }}/values.yaml"
              - "$values/config/envs/{{ .env }}/{{ .region }}/values.yaml"
              - "$values/config/envs/{{ .env }}/{{ .region }}/{{ .cluster }}/values.yaml"
            # Skip levels that don't have an override file — not every app needs
            # a value set at every hierarchy level
            ignoreMissingValueFiles: true

        # ── Source 2: This repo — provides $values reference for valueFiles ────
        - repoURL: https://github.com/rhysmcneill/poc-argocd-monorepo
          targetRevision: HEAD
          ref: values

      destination:
        server: "{{ .server }}"
        namespace: "{{ .namespace }}"

      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
        retry:
          limit: 3
          backoff:
            duration: 5s
            factor: 2
            maxDuration: 3m
