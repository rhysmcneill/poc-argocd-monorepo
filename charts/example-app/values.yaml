# Chart-level defaults — absolute fallback if nothing in config/ sets a value.
# Prefer setting values in config/base/values.yaml so they are visible to all
# charts in the monorepo rather than buried here.

replicaCount: 1

image:
  repository: nginx
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 80

resources:
  limits:
    cpu: 100m
    memory: 128Mi
  requests:
    cpu: 50m
    memory: 64Mi

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80

logLevel: info
