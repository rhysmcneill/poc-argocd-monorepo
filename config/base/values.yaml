# Global platform overrides — applied to every cluster in every environment.
# The chart repo's values.yaml provides the true defaults; this file overrides
# only what the platform needs to diverge from those chart defaults globally.
# Keep this file lean — only set values you explicitly want to differ from the chart.

replicaCount: 1

image:
  repository: nginx
  tag: stable
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8080

resources:
  limits:
    cpu: 100m
    memory: 128Mi
  requests:
    cpu: 50m
    memory: 64Mi

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80

logLevel: info
