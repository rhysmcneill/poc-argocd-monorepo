# Observability — eks-local-dev cluster overrides (highest priority)
grafana:
  adminPassword: "admin"  # dev only — use ExternalSecrets in staging/prod

prometheus:
  server:
    persistentVolume:
      enabled: false

loki:
  deploymentMode: SingleBinary
  singleBinary:
    replicas: 1
  loki:
    useTestSchema: true  # skips schema_config requirement — dev/testing only

tempo:
  enabled: true
