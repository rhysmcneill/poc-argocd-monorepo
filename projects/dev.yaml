---
apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: dev
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.io
spec:
  description: Development environment
  sourceRepos:
    - "*"  # any repo — deployment intent is controlled via app-config.yaml files
  destinations:
    # Restrict dev project to known dev clusters only
    - server: https://kubernetes.default.svc
      namespace: "*"
  clusterResourceWhitelist:
    - group: "*"
      kind: "*"
  namespaceResourceWhitelist:
    - group: "*"
      kind: "*"
  roles:
    - name: developer
      description: Read-only access to dev applications
      policies:
        - p, proj:dev:developer, applications, get, dev/*, allow
        - p, proj:dev:developer, applications, sync, dev/*, allow
