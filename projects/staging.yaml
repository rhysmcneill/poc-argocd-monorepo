---
apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: staging
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.io
spec:
  description: Staging environment
  sourceRepos:
    - "*"  # any repo — deployment intent is controlled via app-config.yaml files
  destinations:
    - server: https://staging-cluster-api.example.com
      namespace: "*"
  clusterResourceWhitelist:
    - group: "*"
      kind: "*"
  namespaceResourceWhitelist:
    - group: "*"
      kind: "*"
  roles:
    - name: developer
      description: Read access to staging applications
      policies:
        - p, proj:staging:developer, applications, get, staging/*, allow
